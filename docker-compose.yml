version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: neopizza_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neopizza_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neopizza_password}
      POSTGRES_DB: ${POSTGRES_DB:-neopizza}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: neopizza_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
